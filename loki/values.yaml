loki:
  replicas: 2
  image:
    tag: 2.9.3
  persistence:
    enabled: true
    size: 10Gi
  config:
    ingester:
      max_chunk_age: 24h
    limits_config:
      enforce_metric_name: false
      max_entries_limit_per_query: 5000
      ingestion_rate_mb: 32
      ingestion_burst_size_mb: 48
      unordered_writes: true
      reject_old_samples: true
      reject_old_samples_max_age: 2160h

promtail:
  enabled: false

grafana:
  enabled: false
