alloy:
  mode: daemonset   # (run on all nodes)
  # Persists WAL/positions; must match volume mount. Not a River block—use this, not `storage {}` in config.
  storagePath: /var/lib/alloy
  extraVolumes:
    - name: alloy-data
      hostPath:
        path: /var/lib/alloy
        type: DirectoryOrCreate

  extraVolumeMounts:
    - name: alloy-data
      mountPath: /var/lib/alloy

  configMap:
    content: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      discovery.kubernetes "pods" {
        role = "pod"
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + sys.env("K8S_NODE_NAME")
        }
      }

      discovery.relabel "pods_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          regex  = "kube-system|monitoring|ingress-nginx"
          action = "drop"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
          regex         = "(.+)"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
          regex         = "(.+)"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods_logs.output
        forward_to = [loki.process.default.receiver]
      }

      loki.process "default" {
        forward_to = [loki.write.default.receiver]
        stage.cri {}
      }

      loki.write "default" {
        endpoint {
          url = "http://loki:3100/loki/api/v1/push"
        }
      }

  # (permissions)
  securityContext:
    runAsUser: 0
    runAsGroup: 0
